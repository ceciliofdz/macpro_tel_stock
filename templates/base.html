<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}MACD PRO{% endblock %}</title>
    <style>
        :root {
            --bg: #0b1220;
            --surface: #121a2b;
            --surface-2: #182235;
            --text: #e5e7eb;
            --muted: #94a3b8;
            --primary: #22c55e;
            --danger: #ef4444;
            --border: rgba(255, 255, 255, 0.08);
            --shadow: 0 24px 60px rgba(0, 0, 0, 0.18);
            --radius: 12px;
            --space-xs: 4px;
            --space-sm: 8px;
            --space-md: 16px;
            --space-lg: 24px;
            --space-xl: 32px;
            --font-base: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            --font-heading: 'IBM Plex Sans', sans-serif;
        }

        *, *::before, *::after {
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            margin: 0;
            min-height: 100vh;
            font-family: var(--font-base);
            background: radial-gradient(circle at top left, rgba(34, 197, 94, 0.14), transparent 25%),
                        linear-gradient(180deg, #0b1220 0%, #05090f 100%);
            color: var(--text);
        }

        a {
            color: inherit;
            text-decoration: none;
        }

        .app-shell {
            max-width: 1180px;
            margin: 0 auto;
            padding: var(--space-xl) var(--space-lg) var(--space-xl);
        }

        .dashboard-header,
        .page-header,
        .header {
            display: flex;
            flex-wrap: wrap;
            justify-content: space-between;
            align-items: center;
            gap: var(--space-md);
            margin-bottom: var(--space-xl);
        }

        .dashboard-header h1,
        .page-header h1,
        .header h1 {
            margin: 0;
            font-family: var(--font-heading);
            font-size: clamp(1.9rem, 2.1vw, 2.5rem);
            letter-spacing: -0.04em;
        }

        .dashboard-header p,
        .header p,
        .hint {
            color: var(--muted);
            margin: 0;
            line-height: 1.5;
        }

        .button-group {
            display: flex;
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            padding: 0.85em 1.4em;
            border-radius: 999px;
            border: 1px solid transparent;
            cursor: pointer;
            font-weight: 600;
            transition: transform 0.2s ease, background-color 0.2s ease, border-color 0.2s ease;
        }

        .btn:hover {
            transform: translateY(-1px);
        }

        .btn-primary {
            background: var(--primary);
            color: #050b15;
        }

        .btn-secondary,
        .btn-home {
            background: rgba(255,255,255,0.06);
            color: var(--text);
            border-color: rgba(255,255,255,0.12);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            padding: var(--space-lg);
        }

        .card h2 {
            margin: 0 0 var(--space-sm);
            font-family: var(--font-heading);
            font-size: 1.25rem;
        }

        .content-grid {
            display: grid;
            gap: var(--space-lg);
            grid-template-columns: minmax(0, 1.75fr) minmax(320px, 1fr);
        }

        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            min-width: 640px;
        }

        thead {
            background: var(--surface-2);
        }

        th, td {
            padding: 16px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            text-align: left;
            vertical-align: middle;
        }

        th {
            color: var(--muted);
            font-size: 0.85rem;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            font-weight: 700;
        }

        tbody tr {
            transition: background 0.2s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.04);
        }

        td {
            color: var(--text);
            font-size: 0.95rem;
        }

        .table-card {
            padding: 0;
            overflow: hidden;
        }

        .stats-panel,
        .no-signals {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
        }

        .stats-panel {
            display: grid;
            grid-template-columns: repeat(2, minmax(0, 1fr));
            gap: var(--space-md);
            padding: var(--space-lg);
            margin-bottom: var(--space-lg);
        }

        .stat-item {
            display: flex;
            flex-direction: column;
            gap: var(--space-xs);
        }

        .stat-item span:first-child {
            color: var(--muted);
            font-size: 0.95rem;
        }

        .stat-item span:last-child {
            font-size: 1.8rem;
            font-weight: 700;
            color: var(--text);
        }

        .signal-buy,
        .signal-sell {
            display: inline-flex;
            align-items: center;
            gap: 0.35rem;
            padding: 0.5em 0.75em;
            border-radius: 999px;
            font-size: 0.9rem;
            font-weight: 700;
        }

        .signal-buy {
            background: rgba(34, 197, 94, 0.14);
            color: var(--primary);
        }

        .signal-sell {
            background: rgba(239, 68, 68, 0.14);
            color: var(--danger);
        }

        .momento-alcista {
            color: var(--primary);
            font-weight: 700;
        }

        .momento-bajista {
            color: var(--danger);
            font-weight: 700;
        }

        .tendencia-bull {
            color: #7dd3fc;
            font-weight: 700;
        }

        .tendencia-bear {
            color: #fb923c;
            font-weight: 700;
        }

        .no-signals {
            padding: var(--space-lg);
            text-align: center;
            color: var(--muted);
            border-radius: var(--radius);
        }

        .field {
            display: grid;
            gap: var(--space-xs);
            margin-bottom: var(--space-md);
        }

        input,
        select {
            width: 100%;
            min-height: 48px;
            padding: 0.9em 1em;
            border-radius: var(--radius);
            border: 1px solid rgba(255, 255, 255, 0.08);
            background: rgba(255, 255, 255, 0.04);
            color: var(--text);
            outline: none;
            transition: border-color 0.2s ease, box-shadow 0.2s ease;
        }

        input:focus,
        select:focus {
            border-color: rgba(34, 197, 94, 0.75);
            box-shadow: 0 0 0 4px rgba(34, 197, 94, 0.12);
        }

        .form-actions {
            display: flex;
            justify-content: flex-end;
            margin-top: var(--space-sm);
            gap: var(--space-sm);
            flex-wrap: wrap;
        }

        @media (max-width: 960px) {
            .content-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (max-width: 860px) {
            .stats-panel {
                grid-template-columns: 1fr;
            }

            .table-card {
                min-width: 0;
            }
        }

        @media (max-width: 640px) {
            .app-shell {
                padding: var(--space-lg);
            }

            .dashboard-header,
            .header,
            .page-header {
                align-items: flex-start;
            }

            .button-group,
            .btn,
            .btn-home {
                width: 100%;
                justify-content: center;
            }
        }
    </style>
</head>
<body>
    <div class="app-shell">
        {% block header %}{% endblock %}
        {% block content %}{% endblock %}
    </div>
</body>
</html>
